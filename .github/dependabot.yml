version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Warsaw
    open-pull-requests-limit: 10
    versioning-strategy: increase
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      development-tooling:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: "deps"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Warsaw
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "deps"

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Warsaw
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:45"
      timezone: Europe/Warsaw
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "deps"
