services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seo_kb}
      POSTGRES_USER: ${POSTGRES_USER:-seo_kb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seo_kb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-seo_kb} -d ${POSTGRES_DB:-seo_kb}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      target: api
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-seo_kb}:${POSTGRES_PASSWORD:-seo_kb}@postgres:5432/${POSTGRES_DB:-seo_kb}
      REDIS_URL: redis://redis:6379
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  crawler-worker:
    build:
      context: .
      target: crawler-worker
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-seo_kb}:${POSTGRES_PASSWORD:-seo_kb}@postgres:5432/${POSTGRES_DB:-seo_kb}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
